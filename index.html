<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Financy Academy</title>
</head>
<body class="light-theme">

  <div id="view_home">
    <nav class="navbar bg-body-tertiary m-5 rounded-2">
      <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand" href="#">
          <img src="logo trabalho educação financeira.png" alt="Financy Academy" width="115" height="100">
        </a>
        
        <ul class="nav nav-pills mx-auto">
          <li class="nav-item mx-2"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item mx-2"><a class="nav-link active" href="#">Categorias</a></li>
          <li class="nav-item mx-2"><a class="nav-link active" href="#">Contatos</a></li>
        </ul>

        <a href="#" id="btn_meu_perfil" class="icon-perfil">
           <span>Meu Perfil</span>
           <i class="fa-solid fa-circle-user fa-2xl"></i>
        </a>
      </div>
    </nav>
  </div>

  <div id="view_dashboard" style="display: none;">
    <div class="dashboard-wrapper">
      
      <aside class="sidebar-config">
        <div class="sidebar-header">
          <i class="fa-solid fa-arrow-left back-icon" onclick="toggleView('home')" title="Voltar para Home"></i>
          <h4>Meu Perfil</h4>
        </div>
        
        <div class="config-section">
          <label class="small fw-bold mb-2">Tema do Sistema:</label>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-light-theme w-50" onclick="setTheme('light')">Claro</button>
            <button class="btn btn-sm btn-dark-theme w-50" onclick="setTheme('dark')">Escuro</button>
          </div>
        </div>
        
        <hr class="my-4 text-secondary">
        
        <div class="config-section">
          <label class="form-label small fw-bold">Alterar E-mail:</label>
          <input type="email" id="dash_input_email" class="form-control form-control-sm mb-3" placeholder="novo@email.com">
          
          <label class="form-label small fw-bold">Alterar Senha:</label>
          <input type="password" id="dash_input_password" class="form-control form-control-sm mb-4" placeholder="********">
          
          <button class="btn btn-primary btn-sm w-100" id="dash_save_data">Atualizar Dados</button>
        </div>
      </aside>

      <main class="main-content-dash">
        <header class="dash-header">
          <h2>Seus Interesses</h2>
          <div class="user-avatar-top">
            <i class="fa-solid fa-circle-user fa-2xl"></i>
          </div>
        </header>

        <div class="interest-grid">
          <div class="interest-card"></div>
          <div class="interest-card"></div>
          <div class="interest-card"></div>
          <div class="interest-card"></div>
          <div class="interest-card"></div>
          <div class="interest-card"></div>
        </div>
      </main>

    </div>
  </div>

  <script src="JavaScript"></script>
</body>
</html>
