<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Financy Academy</title>
  
  <style>
    /* --- CONFIGURAÇÕES DE FUNDO E TEMAS --- */
    body { 
        background-color: #1E2640 !important; 
        transition: background 0.3s ease;
    }
    .dark-theme { background-color: #1E2640 !important; color: white !important; }
    .light-theme { background-color: #f8f9fa !important; color: black !important; }

    /* --- NAVBAR --- */
    nav .navbar {
        background-color: #f2f2f2 !important;
        padding: 0 !important;
    }

    /* --- PERFIL COM HOVER VERDE #2ECC71 --- */
    .icon-perfil, #btn_configuracoes {
        color: #328C73 !important; 
        transition: all 0.3s ease !important;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
    }

    .icon-perfil:hover, .icon-perfil:hover i {
        color: #2ECC71 !important;
    }

    /* --- PAINEL DE CONFIGURAÇÕES --- */
    #panel_settings_overlay { 
      position: fixed; 
      top: 110px; 
      right: 50px; 
      background: white; 
      border: 1px solid #ddd; 
      padding: 20px; 
      z-index: 1000; 
      color: black; 
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* --- BOTÕES DE TEMA NO PAINEL --- */
    /* Botão Claro com texto #328C73 */
    .btn-light-theme {
        background-color: #ffffff !important;
        border: 1px solid #ddd !important;
        color: #328C73 !important;
        font-weight: bold !important;
    }

    /* Botão Escuro com fundo #174873 */
    .btn-dark-theme {
        background-color: #174873 !important;
        border-color: #174873 !important;
        color: #ffffff !important;
    }

    /* --- ESTILOS GERAIS DO PROJETO --- */
    .nav-link.active, .btn-primary {
        background-color: #328C73 !important;
        border: none !important;
        color: white !important;
    }
  </style>
</head>

<body class="light-theme">

  <nav class="navbar bg-body-tertiary m-5 rounded-2">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand" href="#">
        <img src="logo trabalho educação financeira.png" alt="Financy Academy" width="115" height="100">
      </a>
      
      <ul class="nav nav-pills mx-auto">
        <li class="nav-item mx-2"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link active" href="#">Categorias</a></li>
        <li class="nav-item mx-2"><a class="nav-link active" href="#">Contatos</a></li>
      </ul>

      <!-- Botão de Perfil -->
      <a href="#" id="btn_configuracoes" class="icon-perfil">
         <span>Meu Perfil</span>
         <i class="fa-solid fa-circle-user fa-2xl"></i>
      </a>
    </div>
  </nav>

  <script>
    function renderSettingsPanel() {
        const existingPanel = document.getElementById('panel_settings_overlay');
        if (existingPanel) { existingPanel.remove(); return; }

        const panel = document.createElement('div');
        panel.id = "panel_settings_overlay";
        panel.innerHTML = `
            <h4 class="mb-3 text-center">Meu Perfil</h4>
            
            <div class="mb-3">
                <label class="small fw-bold">Tema:</label>
                <div class="d-flex gap-2 mt-1">
                    <!-- Botão Claro com a classe de texto colorida -->
                    <button class="btn btn-sm btn-light-theme w-50" onclick="setTheme('light')">Claro</button>
                    <button class="btn btn-sm btn-dark-theme w-50" onclick="setTheme('dark')">Escuro</button>
                </div>
            </div>
            
            <hr>
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Novo E-mail:</label>
                <input type="email" id="input_email" class="form-control form-control-sm mb-2" placeholder="exemplo@email.com">
                
                <label class="form-label small fw-bold">Nova Senha:</label>
                <input type="password" id="input_password" class="form-control form-control-sm mb-3" placeholder="********">
                
                <button class="btn btn-primary btn-sm w-100" id="save_data">Atualizar Perfil</button>
            </div>
            
            <button class="btn btn-link btn-sm w-100 text-danger text-decoration-none" onclick="this.parentElement.remove()">Fechar</button>
        `;
        document.body.appendChild(panel);

        document.getElementById('save_data').onclick = () => {
            const email = document.getElementById('input_email').value;
            const pass = document.getElementById('input_password').value;
            
            if (!email || !pass) {
                alert("Por favor, preencha todos os campos.");
            } else {
                alert("Dados atualizados com sucesso!");
                panel.remove();
            }
        };
    }

    function setTheme(themeName) {
        document.body.className = themeName + "-theme";
    }

    document.addEventListener("DOMContentLoaded", () => {
        const profileBtn = document.getElementById("btn_configuracoes");
        if (profileBtn) {
            profileBtn.addEventListener('click', (e) => {
                e.preventDefault();
                renderSettingsPanel();
            });
        }
    });
  </script>
</body>
</html>
